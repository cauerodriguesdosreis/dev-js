<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Objetos JS</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Segoe UI", sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      padding: 2rem;
    }

    h1 {
      text-align: center;
      font-size: 1.8rem;
      margin-bottom: 2rem;
      color: #7dd3fc;
      letter-spacing: 1px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 1.5rem;
      max-width: 1000px;
      margin: 0 auto;
    }

    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 1.5rem;
    }

    .card h2 {
      font-size: 1rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 1rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid #334155;
    }

    .card.pessoa h2 { color: #a78bfa; }
    .card.carro  h2 { color: #34d399; }
    .card.loja   h2 { color: #fbbf24; }

    .info { font-size: 0.95rem; line-height: 1.7; color: #cbd5e1; }

    button {
      margin-top: 1rem;
      padding: 0.5rem 1.2rem;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 600;
      transition: opacity 0.2s;
    }
    button:hover { opacity: 0.85; }

    .card.carro  button { background: #34d399; color: #0f172a; }

    .badge {
      display: inline-block;
      background: #0f172a;
      border: 1px solid #475569;
      border-radius: 6px;
      padding: 0.6rem 1rem;
      margin-top: 0.75rem;
      font-size: 0.92rem;
      color: #e2e8f0;
      width: 100%;
    }

    .status {
      margin-top: 0.75rem;
      font-size: 0.9rem;
      color: #86efac;
      min-height: 1.2rem;
    }

    ul { list-style: none; padding: 0; margin-top: 0.5rem; }
    ul li {
      padding: 0.4rem 0;
      border-bottom: 1px solid #1e293b;
      font-size: 0.92rem;
      color: #cbd5e1;
    }
    ul li:last-child { border: none; }
    ul li strong { color: #fde68a; }

    .console {
      max-width: 1000px;
      margin: 2rem auto 0;
      background: #020617;
      border: 1px solid #1e3a5f;
      border-radius: 12px;
      padding: 1.2rem 1.5rem;
    }
    .console h3 {
      color: #38bdf8;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 0.8rem;
    }
    #log {
      font-family: "Courier New", monospace;
      font-size: 0.85rem;
      color: #7dd3fc;
      line-height: 1.8;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>

<h1>🧩 Objetos JavaScript</h1>

<div class="grid">

  <!-- PESSOA -->
  <div class="card pessoa">
    <h2>👤 Pessoa</h2>
    <div class="info" id="pessoa-info"></div>
    <div class="badge" id="pessoa-frase"></div>
  </div>

  <!-- CARRO -->
  <div class="card carro">
    <h2>🚗 Carro</h2>
    <div class="info" id="carro-info"></div>
    <button onclick="ligarCarro()">▶ Ligar o Carro</button>
    <div class="status" id="carro-status"></div>
  </div>

  <!-- LOJA -->
  <div class="card loja">
    <h2>🏪 Loja — Produtos</h2>
    <div class="info" id="loja-nome"></div>
    <ul id="loja-lista"></ul>
  </div>

</div>

<!-- CONSOLE VISUAL -->
<div class="console">
  <h3>⬛ Console</h3>
  <div id="log"></div>
</div>

<script src="app.js"></script>
<script>
  const logEl = document.getElementById("log");
  const originalLog = console.log;

  // Intercepta console.log para exibir na página
  console.log = (...args) => {
    originalLog(...args);
    logEl.textContent += args.join(" ") + "\n";
  };

  // ── PESSOA ──────────────────────────────
  document.getElementById("pessoa-info").innerHTML =
    `<b>Nome:</b> ${pessoa.nome}<br>
     <b>Idade:</b> ${pessoa.idade} anos<br>
     <b>Profissão:</b> ${pessoa.profissao}`;

  document.getElementById("pessoa-frase").textContent = pessoa.apresentar();

  // ── CARRO ───────────────────────────────
  document.getElementById("carro-info").innerHTML =
    `<b>Marca:</b> ${carro.marca}<br>
     <b>Modelo:</b> ${carro.modelo}<br>
     <b>Ano:</b> ${carro.ano}`;

  function ligarCarro() {
    const msg = carro.ligar();
    document.getElementById("carro-status").textContent = "✅ " + msg;
  }

  // ── LOJA ────────────────────────────────
  document.getElementById("loja-nome").innerHTML =
    `<b>Loja:</b> ${loja.nome}`;

  document.getElementById("loja-lista").innerHTML = loja.listarHTML();

  // ── LOG INICIAL ─────────────────────────
  console.log("════════════════════════════════════");
  console.log("   Página carregada com sucesso! ✅  ");
  console.log("════════════════════════════════════");
  console.log("\n👤 PESSOA:");
  console.log("  " + pessoa.apresentar());
  console.log("\n🚗 CARRO:");
  console.log("  " + carro.marca + " " + carro.modelo + " (" + carro.ano + ")");
  loja.listarComForIn();
  loja.listarComEntries();
</script>
</body>
</html>
